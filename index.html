<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capacitor Notification</title>
</head>
<body>

    <h1>Mobile Notification Test</h1>
    <button onclick="sendNotification()">Show Notification</button>

    <!-- Global object injection standard tarika bina system bundling ke -->
    <script>
        // Custom error handler jo mobile screen par error alert dikhayega
        window.onerror = function(msg, url, linenumber) {
            alert('Error: ' + msg + '\nLine: ' + linenumber);
            return true;
        };

        // Android environment check aur manual trigger ke liye logic
        async function requestPermission() {
            try {
                // Agar script correctly inject nahi hui to error pakadne ke liye
                if (typeof Capacitor === 'undefined') {
                    alert("Capacitor core library load nahi ho payi!");
                    return;
                }
                
                // Pure Javascript dynamic bridge use kar rahe hain jo browser fetch bypass karega
                const { LocalNotifications } = Capacitor.Plugins;
                if(!LocalNotifications) {
                    alert("LocalNotifications plugin package.json se sahi se merge nahi hua.");
                    return;
                }

                const status = await LocalNotifications.requestPermissions();
                alert('Permission status: ' + JSON.stringify(status));
            } catch (err) {
                alert('Permission Error: ' + err.message);
            }
        }

        window.sendNotification = async function() {
            try {
                const { LocalNotifications } = Capacitor.Plugins;
                
                await LocalNotifications.schedule({
                    notifications: [
                        {
                            title: "Namaste Android!",
                            body: "Yeh mobile se push notification test hai.",
                            id: 1,
                            schedule: { at: new Date(Date.now() + 1000) }
                        }
                    ]
                });
                alert("Notification schedule ho gaya! 1 sec rukiye.");
            } catch (err) {
                alert('Trigger Error: ' + err.message);
            }
        };

        // Page load hone ke thodi der baad chalayein taaki Capacitor bridge active ho sake
        setTimeout(() => {
            requestPermission();
        }, 1500);
    </script>
</body>
</html>
